function renderCalc(){
  function calcJuros(){
    const {capital,taxa,meses}=S.calcJuros;
    if(!capital||!taxa||!meses) return toast('Preencha todos os campos','err');
    const C=parseFloat(capital),r=parseFloat(taxa)/100,n=parseInt(meses);
    const montante=C*Math.pow(1+r,n);
    const juros=montante-C;
    S.calcResult={tipo:'juros',capital:C,montante,juros,meses:n};
    render();
  }
  function calcQuit(){
    const {divida,extra}=S.calcQuit;
    if(!divida||!extra) return toast('Preencha os campos','err');
    const D=parseFloat(divida),E=parseFloat(extra);
    if(E<=0) return toast('Valor extra deve ser maior que zero','err');
    const meses=Math.ceil(D/E);
    S.calcResult={tipo:'quit',divida:D,extra:E,meses};
    render();
  }

  const resHtml = S.calcResult ? (
    S.calcResult.tipo==='juros'
    ? `<div class="calc-result">
        <div style="font-size:13px;color:var(--text3);margin-bottom:4px">Montante final</div>
        <div class="calc-result-val">${brl(S.calcResult.montante)}</div>
        <div class="calc-result-lbl">Juros gerados: <b style="color:var(--red)">${brl(S.calcResult.juros)}</b> em ${S.calcResult.meses} meses</div>
      </div>`
    : `<div class="calc-result">
        <div style="font-size:13px;color:var(--text3);margin-bottom:4px">Tempo para quitar</div>
        <div class="calc-result-val">${S.calcResult.meses} ${S.calcResult.meses===1?'mês':'meses'}</div>
        <div class="calc-result-lbl">Pagando ${brl(S.calcResult.extra)} extra/mês sobre ${brl(S.calcResult.divida)}</div>
      </div>`
  ) : '';

  return `
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <button onclick="S.calcTab='juros';S.calcResult=null;render()" style="flex:1;padding:11px;border-radius:12px;border:1.5px solid ${S.calcTab==='juros'?'var(--accent)':'var(--border)'};background:${S.calcTab==='juros'?'rgba(79,142,247,.15)':'var(--bg3)'};color:${S.calcTab==='juros'?'var(--accent)':'var(--text3)'};font-weight:700;cursor:pointer;font-size:14px">📈 Juros Compostos</button>
    <button onclick="S.calcTab='quitacao';S.calcResult=null;render()" style="flex:1;padding:11px;border-radius:12px;border:1.5px solid ${S.calcTab==='quitacao'?'var(--accent)':'var(--border)'};background:${S.calcTab==='quitacao'?'rgba(79,142,247,.15)':'var(--bg3)'};color:${S.calcTab==='quitacao'?'var(--accent)':'var(--text3)'};font-weight:700;cursor:pointer;font-size:14px">🏁 Quitação</button>
  </div>
  ${S.calcTab==='juros' ? `
  <div class="card">
    <div style="font-size:14px;color:var(--text2);margin-bottom:14px;line-height:1.5">Simule quanto uma dívida ou investimento cresce com juros compostos.</div>
    <div class="field"><label class="lbl">Valor inicial (R$)</label><input type="number" inputmode="decimal" placeholder="Ex: 1000" value="${escHtml(S.calcJuros.capital)}" oninput="S.calcJuros.capital=this.value"></div>
    <div class="field"><label class="lbl">Taxa de juros ao mês (%)</label><input type="number" inputmode="decimal" placeholder="Ex: 5.5" value="${escHtml(S.calcJuros.taxa)}" oninput="S.calcJuros.taxa=this.value"></div>
    <div class="field"><label class="lbl">Número de meses</label><input type="number" inputmode="numeric" placeholder="Ex: 12" value="${escHtml(S.calcJuros.meses)}" oninput="S.calcJuros.meses=this.value"></div>
    <button class="btn btn-primary" onclick="(${calcJuros.toString()})()">🧮 Calcular</button>
    ${resHtml}
  </div>` : `
  <div class="card">
    <div style="font-size:14px;color:var(--text2);margin-bottom:14px;line-height:1.5">Descubra em quantos meses quita uma dívida pagando um valor fixo por mês.</div>
    <div class="field"><label class="lbl">Valor total da dívida (R$)</label><input type="number" inputmode="decimal" placeholder="Ex: 3500" value="${escHtml(S.calcQuit.divida)}" oninput="S.calcQuit.divida=this.value"></div>
    <div class="field"><label class="lbl">Quanto paga por mês (R$)</label><input type="number" inputmode="decimal" placeholder="Ex: 500" value="${escHtml(S.calcQuit.extra)}" oninput="S.calcQuit.extra=this.value"></div>
    <button class="btn btn-primary" onclick="(${calcQuit.toString()})()">🧮 Calcular</button>
    ${resHtml}
  </div>`}`;
}

function adicionarAoCalendario(id){
  const d=S.debts.find(x=>x.id===id);
  if(!d) return;
  const dt=dueDateObj(d);
  const pad=n=>String(n).padStart(2,'0');
  const fmtT=x=>`${x.getFullYear()}${pad(x.getMonth()+1)}${pad(x.getDate())}T${pad(x.getHours())}${pad(x.getMinutes())}00`;
  const uid='paykeep-'+d.id+'@app';
  const desc='Valor: '+brl(d.amount)+'\\nCategoria: '+cat(d.category).label+(d.notes?'\\nObs: '+d.notes:'');
  const ical=[
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//PayKeep//PT',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'BEGIN:VEVENT',
    'UID:'+uid,
    'DTSTART:'+fmtT(dt),
    'DTEND:'+fmtT(new Date(dt.getTime()+3600000)),
    'SUMMARY:💸 Vence: '+d.name,
    'DESCRIPTION:'+desc,
    'BEGIN:VALARM',
    'TRIGGER:-PT1440M',
    'ACTION:DISPLAY',
    'DESCRIPTION:Lembrete: '+d.name+' vence amanhã',
    'END:VALARM',
    'END:VEVENT',
    'END:VCALENDAR'
  ].join('\r\n');

  const blob=new Blob([ical],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);

  // Detectar plataforma
  const ua=navigator.userAgent.toLowerCase();
  const isIOS=/iphone|ipad|ipod/.test(ua);
  const isAndroid=/android/.test(ua);
  const isMac=/macintosh|mac os x/.test(ua) && !isIOS;
  const isWindows=/windows/.test(ua);

  if(isIOS||isAndroid){
    // Mobile: abre direto — o sistema pergunta qual app usar
    const a=document.createElement('a');
    a.href=url; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
    toast('Abrindo calendário... 📅');
  } else if(isMac||isWindows){
    // Desktop: baixa o .ics — Windows abre no Outlook/Calendário, Mac no Apple Calendar
    const a=document.createElement('a');
    a.href=url;
    a.download=d.name.replace(/[^a-z0-9]/gi,'_')+'.ics';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
    toast('Arquivo .ics baixado — abra para adicionar ao calendário 📅');
  } else {
    // Fallback genérico
    const a=document.createElement('a');
    a.href=url;
    a.download=d.name.replace(/[^a-z0-9]/gi,'_')+'.ics';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
    toast('Arquivo .ics baixado 📅');
  }
}

function compartilharResumo(){
  const total=S.debts.reduce((s,d)=>s+d.amount,0);
  const pago=S.debts.filter(d=>d.paid).reduce((s,d)=>s+d.amount,0);
  const pendente=total-pago;
  const proxima=[...S.debts].filter(d=>!d.paid).sort((a,b)=>daysUntil(a)-daysUntil(b))[0];
  const mes=MONTHS[TODAY().getMonth()];
  let txt=`📊 PayKeep — Resumo de ${mes}\n`;
  txt+=`💸 Total em dívidas: ${brl(total)}\n`;
  txt+=`✅ Já pago: ${brl(pago)}\n`;
  txt+=`⏳ Pendente: ${brl(pendente)}\n`;
  if(S.salary>0) txt+=`💰 Sobra no bolso: ${brl(S.salary-total)}\n`;
  if(proxima) txt+=`📌 Próxima: ${proxima.name} ${brl(proxima.amount)} (${dueDateLabel(proxima)})\n`;
  if(navigator.share){
    navigator.share({title:'Resumo PayKeep',text:txt}).catch(()=>{});
  } else {
    navigator.clipboard?.writeText(txt).then(()=>toast('Resumo copiado! 📋')).catch(()=>toast('Não foi possível copiar','err'));
  }
}

const IS_DESKTOP = () => window.innerWidth >= 900;

function renderSidebar(){
  if(!S.currentUser) return;
  const sb = document.getElementById('pk-sidebar');
  if(!sb) return;
  if(!IS_DESKTOP()){ sb.innerHTML=''; return; }
  const total=S.debts.reduce((s,d)=>s+d.amount,0);
  const sobra=S.salary-total;
  const items=[
    {id:'home',    ico:'🏠', label:'Início'},
    {id:'list',    ico:'📋', label:'Dívidas', badge:S.debts.length||0},
    {id:'add',     ico:'＋', label:'Adicionar'},
    {id:'planning',ico:S.currentUser.isPremium?'📊':'🔒', label:'Planejamento'},
    {id:'help',    ico:'❓', label:'Ajuda'},
  ];
  const navItems = items.map(v=>{
    const active = (S.view===v.id && !(v.id==='add' && S.editMode)) ? 'on' : '';
    const click  = v.id==='add' ? 'goAdd()' : "go('" + v.id + "')";
    const badge  = v.badge ? '<span class="pk-sb-badge">'+v.badge+'</span>' : '';
    return '<button class="pk-sb-item '+active+'" onclick="'+click+'"><span class="ico">'+v.ico+'</span>'+v.label+badge+'</button>';
  }).join('');
  const sobraColor = sobra>=0 ? '#22c55e' : '#ef4444';
  const user = escHtml(S.currentUser.email.split('@')[0]||'');
  const pro  = S.currentUser.isPremium ? ' <span class="premium-crown">★ PRO</span>' : '';
  sb.innerHTML =
    '<div class="pk-sb-logo">'
    + '<div class="hdr-logo">Pay<span>keep</span></div>'
    + '<div class="pk-sb-sub">'+MONTHS[TODAY().getMonth()]+' '+TODAY().getFullYear()+' &bull; '+user+pro+'</div>'
    + '</div>'
    + navItems
    + '<div class="pk-sb-footer">'
    + '<div class="pk-sb-balance">'
    + '<div class="lbl">Sobra no bolso</div>'
    + '<div class="val" style="color:'+sobraColor+'">'+brl(sobra)+'</div>'
    + '</div>'
    + '<button class="pk-sb-logout" onclick="showConfirm(&quot;Sair da conta?&quot;,doLogout)">Sair da conta</button>'
    + '</div>';
}

function render(){
  const scrollY = window.scrollY;
  const sidebar = document.getElementById('pk-sidebar');
  const appEl   = document.getElementById('app');

  if(!S.currentUser){
    // ── Sem usuário: remove classe, esconde sidebar, centraliza ──
    document.body.classList.remove('logged-in');
    sidebar.innerHTML = '';
    appEl.innerHTML = viewAuth();
    window.scrollTo(0,0);
    return;
  }

  // ── Logado: ativa classe que libera sidebar no desktop ──
  document.body.classList.add('logged-in');
  let pageContent='';
  if(S.view==='home')          pageContent=viewHome();
  else if(S.view==='list')     pageContent=viewList();
  else if(S.view==='add')      pageContent=viewAdd();
  else if(S.view==='detail')   pageContent=viewDetail();
  else if(S.view==='planning') pageContent=viewPlanning();
  else if(S.view==='help')     pageContent=viewHelp();

  renderSidebar();
  document.getElementById('app').innerHTML = pageContent + (IS_DESKTOP()?'':renderNav());

  renderConfirm();
  try{ localStorage.setItem('mdv_view', S.view); }catch{}
  if(S._lastView !== S.view){ window.scrollTo(0,0); }
  else { window.scrollTo(0, scrollY); }
  S._lastView = S.view;
}

let _resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(_resizeTimer);
  _resizeTimer=setTimeout(()=>{ if(S.currentUser) render(); },150);
});

function go(v){ S.view=v; render(); }
function goAdd(){ S.editMode=false; S.form={name:'',amount:'',dueDate:'',category:'outro',notes:'',monthly:false}; S.preview=null; S.importText=''; S.importErr=''; S.view='add'; render(); }
